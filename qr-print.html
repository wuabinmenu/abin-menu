    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      background:

    }

      margin: 8px 0 18px;
      color: #60708f;
      font-size: 16px;
      font-weight: 800;
    }

    img {
      display: block;
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
      padding: 10px;
      border: 3px solid #f4ee45;
      border-radius: 10px;
      background: #fffef5;
    }

    .link {
      margin-top: 16px;
      padding: 10px;
      border-radius: 8px;
      background: #eef6ff;
      color: #174078;
      font-size: 13px;
      font-weight: 800;
      word-break: break-all;
    }

    @media print {
      body {
        padding: 0;
        background: #ffffff;
      }

      .poster {
        box-shadow: none;
      }
    }
  </style>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="ea6b0e1b-bf74-4ee2-a98a-0ad8d7945753" data-domains="wuabinmenu.github.io"></script>
