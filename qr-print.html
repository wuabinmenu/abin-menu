<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>啊斌大排档菜单二维码</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #174078;
      background: #eef6ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        linear-gradient(90deg, rgba(34, 112, 226, 0.07) 1px, transparent 1px) 0 0 / 18px 18px,
        linear-gradient(180deg, #eaf4ff 0%, #fffef5 100%);
    }

    .poster {
      width: min(100%, 420px);
      padding: 22px;
      border: 4px solid #2270e2;
      border-bottom: 10px solid #f4ee45;
      border-radius: 14px;
      background: #ffffff;
      text-align: center;
      box-shadow: 0 18px 42px rgba(34, 91, 166, 0.18);
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.05;
      color: #2270e2;
      font-weight: 950;
    }

    p {
      margin: 8px 0 18px;
      color: #60708f;
      font-size: 16px;
      font-weight: 800;
    }

    img {
      display: block;
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
      padding: 10px;
      border: 3px solid #f4ee45;
      border-radius: 10px;
      background: #fffef5;
    }

    .link {
      margin-top: 16px;
      padding: 10px;
      border-radius: 8px;
      background: #eef6ff;
      color: #174078;
      font-size: 13px;
      font-weight: 800;
      word-break: break-all;
    }

    @media print {
      body {
        padding: 0;
        background: #ffffff;
      }

      .poster {
        box-shadow: none;
      }
    }
  </style>
</head>
