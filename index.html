<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>啊斌大排档 - 数字菜单</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111213;
      --panel: #191b1c;
      --panel-2: #202322;
      --text: #f7f1e8;
      --muted: #b9afa3;
      --line: rgba(255, 255, 255, 0.1);
      --red: #e94b35;
      --amber: #f0b85a;
      --green: #63bc7b;
      --blue: #71b7dd;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 16% 0%, rgba(233, 75, 53, 0.22), transparent 28rem),
        radial-gradient(circle at 84% 18%, rgba(99, 188, 123, 0.13), transparent 24rem),
        linear-gradient(180deg, #141515 0%, #101112 56%, #0d0e0f 100%);
      color: var(--text);
      letter-spacing: 0;
      padding-bottom: calc(190px + env(safe-area-inset-bottom));
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    .app {
      width: min(100%, 560px);
      margin: 0 auto;
      position: relative;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: calc(10px + env(safe-area-inset-top)) 14px 10px;
      background: rgba(17, 18, 19, 0.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }

    .lang-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      margin-bottom: 10px;
    }

    .lang-btn {
      min-height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: var(--radius);
      background: #202322;
      color: var(--muted);
      font-weight: 750;
      font-size: 13px;
    }

    .lang-btn.active {
      color: #18120d;
      border-color: rgba(240, 184, 90, 0.95);
      background: linear-gradient(180deg, #ffd282, #f0b85a);
      box-shadow: 0 8px 24px rgba(240, 184, 90, 0.23);
    }

    .brand-row {
      display: block;
    }

    .brand-title {
      margin: 0;
      font-size: clamp(22px, 7vw, 34px);
      line-height: 1.04;
      font-weight: 920;
      letter-spacing: 0;
    }

    .brand-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .table-badge {
      flex: 0 0 auto;
      padding: 8px 10px;
      border: 1px solid rgba(233, 75, 53, 0.38);
      border-radius: var(--radius);
      background: rgba(233, 75, 53, 0.12);
      color: #ffd6cc;
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    .hero {
      min-height: 178px;
      margin: 12px 14px 4px;
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: var(--shadow);
      background:
        linear-gradient(100deg, rgba(12, 13, 13, 0.82), rgba(12, 13, 13, 0.18)),
        url("https://images.unsplash.com/photo-1526318896980-cf78c088247c?auto=format&fit=crop&w=1200&q=80") center/cover;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 58%;
      background: linear-gradient(180deg, transparent, rgba(17, 18, 19, 0.92));
      pointer-events: none;
    }

    .hero-copy {
      position: relative;
      z-index: 1;
      padding: 18px 16px 34px;
      max-width: 88%;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 28px;
      padding: 0 9px;
      border-radius: var(--radius);
      background: rgba(240, 184, 90, 0.16);
      color: #ffde9d;
      border: 1px solid rgba(240, 184, 90, 0.26);
      font-size: 12px;
      font-weight: 850;
    }

    .hero h2 {
      margin: 11px 0 0;
      max-width: 290px;
      font-size: 25px;
      line-height: 1.05;
      font-weight: 920;
    }

    .tabs {
      position: sticky;
      top: calc(96px + env(safe-area-inset-top));
      z-index: 15;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(17, 18, 19, 0.82);
      backdrop-filter: blur(16px);
    }

    .tab-btn {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      background: #1b1d1d;
      font-weight: 860;
    }

    .tab-btn.active {
      color: #fff9ef;
      border-color: rgba(233, 75, 53, 0.56);
      background: linear-gradient(180deg, rgba(233, 75, 53, 0.28), rgba(233, 75, 53, 0.14));
    }

    main {
      padding: 0 14px 128px;
    }

    section {
      margin-top: 18px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .section-head h3 {
      margin: 0;
      font-size: 19px;
      font-weight: 910;
      line-height: 1.2;
    }

    .section-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
      text-align: right;
    }

    .hot-scroll {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 78%;
      gap: 11px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .hot-scroll::-webkit-scrollbar {
      display: none;
    }

    .dish-card {
      scroll-snap-align: start;
      overflow: hidden;
      border-radius: var(--radius);
      background: linear-gradient(180deg, #222524, #181a1a);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.2);
    }

    .dish-art {
      height: 142px;
      position: relative;
      overflow: hidden;
      background: #25211d;
    }

    .dish-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(1.05) contrast(1.05);
    }

    .dish-art .flag {
      position: absolute;
      left: 10px;
      top: 10px;
      min-height: 28px;
      padding: 5px 8px;
      border-radius: var(--radius);
      background: rgba(17, 18, 19, 0.78);
      color: #ffda99;
      font-size: 12px;
      font-weight: 860;
      backdrop-filter: blur(10px);
    }

    .dish-body {
      padding: 12px;
    }

    .dish-name {
      margin: 0;
      font-size: 17px;
      line-height: 1.25;
      font-weight: 880;
    }

    .dish-meta {
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .price {
      color: #ffd88e;
      font-weight: 920;
      font-size: 17px;
    }

    .stepper {
      display: grid;
      grid-template-columns: 38px minmax(28px, auto) 38px;
      align-items: center;
      min-height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.04);
    }

    .stepper button {
      width: 38px;
      height: 38px;
      border: 0;
      background: transparent;
      color: var(--text);
      font-size: 23px;
      line-height: 1;
      font-weight: 700;
    }

    .stepper button:last-child {
      color: #17100a;
      background: #f0b85a;
    }

    .stepper span {
      min-width: 28px;
      text-align: center;
      font-weight: 850;
      font-size: 14px;
    }

    .category-stack {
      display: grid;
      gap: 12px;
    }

    .category {
      padding: 13px 12px 5px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid var(--line);
    }

    .category h4 {
      margin: 0 0 7px;
      color: #fff3db;
      font-size: 16px;
      font-weight: 880;
    }

    .list-item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 58px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .list-title {
      display: block;
      font-size: 15px;
      line-height: 1.25;
      font-weight: 760;
    }

    .list-tags {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }

    .smart-panel {
      display: none;
    }

    .smart-panel.active,
    .menu-panel.active {
      display: block;
    }

    .menu-panel {
      display: none;
    }

    .control-panel {
      padding: 14px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(240, 184, 90, 0.11), rgba(255, 255, 255, 0.045));
      border: 1px solid rgba(240, 184, 90, 0.2);
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: #fff3db;
      font-size: 13px;
      font-weight: 850;
    }

    .select-wrap select {
      width: 100%;
      min-height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: var(--radius);
      background: #181a1a;
      color: var(--text);
      padding: 0 12px;
      font-weight: 760;
    }

    .choice-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .choice {
      min-height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      background: #181a1a;
      color: var(--muted);
      font-weight: 850;
    }

    .choice.active {
      color: #101112;
      background: #63bc7b;
      border-color: #63bc7b;
    }

    .primary-btn,
    .ghost-btn {
      width: 100%;
      min-height: 48px;
      border-radius: var(--radius);
      font-weight: 900;
      padding: 7px 10px;
      line-height: 1.18;
      white-space: normal;
    }

    .primary-btn {
      border: 0;
      color: #160f09;
      background: linear-gradient(180deg, #ffd282, #f0b85a);
      box-shadow: 0 10px 28px rgba(240, 184, 90, 0.22);
    }

    .ghost-btn {
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
    }

    .combo-result {
      margin-top: 14px;
      padding: 14px;
      border-radius: var(--radius);
      background: #181a1a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
    }

    .combo-title {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
    }

    .combo-sub {
      margin: 6px 0 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .combo-list {
      display: grid;
      gap: 8px;
      margin: 0 0 14px;
      padding: 0;
      list-style: none;
    }

    .combo-list li {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 42px;
      padding: 9px 10px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.05);
    }

    .combo-actions {
      display: grid;
      grid-template-columns: 0.92fr 1.08fr;
      gap: 8px;
    }

    .cart-bar {
      position: fixed;
      z-index: 30;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(100%, 560px);
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      background: rgba(14, 15, 15, 0.94);
      backdrop-filter: blur(18px);
      border-top: 1px solid rgba(255, 255, 255, 0.12);
    }

    .cart-summary {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .cart-count {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .cart-total {
      color: #ffd88e;
      font-size: 20px;
      font-weight: 930;
    }

    .cart-panel {
      display: none;
      max-height: 38vh;
      overflow: auto;
      margin-bottom: 9px;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #181a1a;
    }

    .cart-panel.open {
      display: block;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 54px;
      padding: 9px 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .cart-item:first-child {
      border-top: 0;
    }

    .cart-name {
      font-size: 14px;
      font-weight: 760;
      line-height: 1.25;
    }

    .cart-small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .cart-actions {
      display: grid;
      grid-template-columns: 0.7fr 1.3fr;
      gap: 8px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(104px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(16px);
      z-index: 40;
      width: min(calc(100% - 28px), 532px);
      padding: 12px 13px;
      border-radius: var(--radius);
      background: #f7f1e8;
      color: #131313;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: 180ms ease;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .empty {
      padding: 18px 10px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }

    @media (min-width: 460px) {
      .hot-scroll {
        grid-auto-columns: 64%;
      }
    }

    /* Visual refresh: border-night food stall, warm paper menu, bolder ordering rhythm. */
    :root {
      --bg: #120f0d;
      --panel: #221716;
      --panel-2: #fff6df;
      --text: #fff8ed;
      --ink: #241916;
      --muted: #c9b79e;
      --line: rgba(255, 239, 214, 0.16);
      --red: #c93124;
      --red-deep: #7b1b17;
      --amber: #f5bd55;
      --green: #2f7c62;
      --blue: #244f68;
      --shadow: 0 18px 44px rgba(18, 7, 5, 0.36);
    }

    html {
      background: #120f0d;
    }

    body {
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px) 0 0 / 18px 18px,
        radial-gradient(circle at 18% -8%, rgba(201, 49, 36, 0.42), transparent 22rem),
        radial-gradient(circle at 92% 16%, rgba(47, 124, 98, 0.3), transparent 20rem),
        linear-gradient(180deg, #20110f 0%, #12100d 36%, #0d1210 100%);
    }

    .app {
      isolation: isolate;
    }

    .topbar {
      padding: calc(11px + env(safe-area-inset-top)) 12px 12px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px) 0 0 / 12px 12px,
        linear-gradient(180deg, rgba(94, 20, 17, 0.96), rgba(30, 18, 15, 0.96));
      border-bottom: 1px solid rgba(245, 189, 85, 0.32);
      box-shadow: 0 10px 28px rgba(8, 4, 3, 0.32);
    }

    .lang-row {
      gap: 8px;
      margin-bottom: 12px;
    }

    .lang-btn {
      min-height: 42px;
      border-color: rgba(255, 246, 223, 0.18);
      background: rgba(18, 15, 13, 0.58);
      color: #e8d7bd;
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.04);
    }

    .lang-btn.active {
      color: #2a140d;
      border-color: #ffe0a0;
      background: linear-gradient(180deg, #ffe29f 0%, #f5bd55 100%);
      box-shadow: 0 7px 18px rgba(245, 189, 85, 0.26), inset 0 1px 0 rgba(255, 255, 255, 0.42);
    }

    .brand-row {
      align-items: stretch;
      min-height: 86px;
      padding: 13px 12px;
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(123, 27, 23, 0.98), rgba(33, 17, 14, 0.9) 58%, rgba(15, 17, 15, 0.96)),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.08) 0 1px, transparent 1px 10px);
      border: 1px solid rgba(245, 189, 85, 0.28);
      box-shadow: inset 0 -14px 34px rgba(0, 0, 0, 0.22);
    }

    .brand-title {
      font-size: clamp(28px, 8.8vw, 43px);
      color: #fff4dc;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.28);
    }

    .brand-subtitle {
      color: #f0cfa2;
      font-weight: 650;
    }

    .table-badge {
      align-self: center;
      min-width: 70px;
      padding: 9px 10px;
      border-color: rgba(245, 189, 85, 0.46);
      background: rgba(255, 246, 223, 0.1);
      color: #ffe1a4;
      box-shadow: inset 0 0 0 1px rgba(201, 49, 36, 0.3);
    }

    .hero {
      min-height: 128px;
      margin: 12px 12px 0;
      border-color: rgba(245, 189, 85, 0.35);
      background:
        radial-gradient(circle at 88% 24%, rgba(245, 189, 85, 0.36), transparent 7rem),
        radial-gradient(circle at 12% 82%, rgba(47, 124, 98, 0.34), transparent 8rem),
        linear-gradient(135deg, #fff3d3 0%, #f3bd59 34%, #c93124 34%, #7b1b17 68%, #1c1713 68%);
      box-shadow: 0 16px 36px rgba(12, 7, 5, 0.38);
    }

    .hero::before {
      content: "";
      position: absolute;
      right: -22px;
      top: -18px;
      width: 154px;
      height: 154px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 47%, #1b1612 0 26%, #40342a 27% 34%, #f4c162 35% 38%, transparent 39%),
        conic-gradient(from 38deg, rgba(255, 247, 221, 0.42), transparent 20%, rgba(255, 247, 221, 0.32), transparent 43%);
      opacity: 0.9;
    }

    .hero::after {
      inset: 0;
      height: auto;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.12) 1px, transparent 1px) 0 0 / 22px 22px,
        linear-gradient(180deg, rgba(36, 25, 22, 0.08), rgba(36, 25, 22, 0.26));
    }

    .hero-copy {
      padding: 16px 16px 22px;
      max-width: 72%;
    }

    .eyebrow {
      background: #241916;
      color: #ffe2a3;
      border-color: rgba(255, 226, 163, 0.32);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.16);
    }

    .hero h2 {
      color: #fff9ec;
      max-width: 260px;
      font-size: 24px;
      line-height: 1.12;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.23);
    }

    .tabs {
      top: calc(122px + env(safe-area-inset-top));
      gap: 0;
      margin: 10px 12px 0;
      padding: 4px;
      border-radius: var(--radius);
      background: rgba(255, 246, 223, 0.1);
      border: 1px solid rgba(245, 189, 85, 0.22);
    }

    .tab-btn {
      min-height: 46px;
      border: 0;
      background: transparent;
      color: #dbc6a8;
    }

    .tab-btn.active {
      color: #fff8ed;
      background: linear-gradient(180deg, #c93124, #7b1b17);
      box-shadow: 0 8px 20px rgba(123, 27, 23, 0.34);
    }

    main {
      padding: 0 12px 20px;
    }

    section {
      margin-top: 22px;
    }

    .section-head h3 {
      color: #fff4dc;
      font-size: 20px;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.18);
    }

    .section-note {
      color: #d6c1a1;
    }

    .hot-scroll {
      grid-auto-columns: 82%;
      gap: 12px;
      padding: 2px 0 8px;
    }

    .dish-card {
      display: grid;
      grid-template-columns: 43% 57%;
      min-height: 168px;
      background: #fff6df;
      border: 1px solid rgba(245, 189, 85, 0.45);
      box-shadow: 0 14px 30px rgba(14, 8, 5, 0.28);
    }

    .dish-art {
      height: 100%;
      min-height: 168px;
      background: #3a1f18;
    }

    .dish-art img {
      filter: saturate(1.08) contrast(1.08);
    }

    .dish-art::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 58%, rgba(36, 25, 22, 0.28));
    }

    .dish-art .flag {
      left: 8px;
      top: 8px;
      background: #c93124;
      color: #fff4dc;
      border: 1px solid rgba(255, 246, 223, 0.26);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.18);
    }

    .dish-body {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 13px;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(36, 25, 22, 0.055) 1px, transparent 1px) 0 0 / 18px 18px,

      "pork-mix-guozhibian": { en: "Mixed pork offal guozhi rice paste", th: "ข้าวเปียกเครื่องในหมู", km: "គុយទាវកាវជឺគ្រឿងក្នុងជ្រូក" },
      "seafood-noodle": { en: "Seafood rice noodles / noodles", th: "ก๋วยเตี๋ยวซีฟู้ด", km: "គុយទាវអាហារសមុទ្រ" },
      "seafood-guozhibian": { en: "Seafood guozhi rice paste", th: "ข้าวเปียกซีฟู้ด", km: "គុយទាវកាវជឺសមុទ្រ" },
      "chaoshan-ball-noodle": { en: "Chaoshan meatball rice noodles / noodles", th: "ก๋วยเตี๋ยวลูกชิ้นแต้จิ๋ว", km: "គុយទាវប្រហិតជាវចូវ" },
      "ball-guozhibian": { en: "Meatball guozhi rice paste", th: "ข้าวเปียกลูกชิ้น", km: "គុយទាវកាវជឺប្រហិត" },
      "fried-rice-noodle": { en: "Special fried rice noodles", th: "เส้นหมี่ผัดพิเศษ", km: "មីសួរឆាពិសេស" },
      "instant-noodle": { en: "Special instant noodles", th: "บะหมี่กึ่งสำเร็จรูปพิเศษ", km: "មីកញ្ចប់ពិសេស" },
      "egg-fried-rice": { en: "Special egg fried rice", th: "ข้าวผัดไข่พิเศษ", km: "បាយឆាស៊ុតពិសេស" },
      "pork-leg-rice": { en: "Longjiang pork leg rice", th: "ข้าวขาหมูหลงเจียง", km: "បាយជើងជ្រូកឡុងជាំង" },
      "roast-duck-rice": { en: "Cantonese roast duck rice", th: "ข้าวเป็ดย่างกวางตุ้ง", km: "បាយទាអាំងក្វាងទុង" },
      "black-pepper-beef-rice": { en: "Black pepper beef rice", th: "ข้าวหน้าเนื้อพริกไทยดำ", km: "បាយសាច់គោម្រេចខ្មៅ" },
      "frog-rice": { en: "Frog rice bowl", th: "ข้าวหน้ากบ", km: "បាយកង្កែប" },
      "squid-rice": { en: "Squid rice bowl", th: "ข้าวหน้าปลาหมึก", km: "បាយមឹក" },
      "kidney-rice": { en: "Pork kidney rice bowl", th: "ข้าวหน้าไตหมู", km: "បាយតម្រងនោមជ្រូក" },
      "intestine-rice": { en: "Pork intestine rice bowl", th: "ข้าวหน้าไส้หมู", km: "បាយពោះវៀនជ្រូក" }
    };

    MENU.forEach((item) => {
      Object.assign(item.name, MENU_TRANSLATIONS[item.id] || {});
    });

    const state = {
      lang: "zh",
      cart: new Map(),
      activeTab: "menu",
      purpose: "下酒",
      lastCombo: null,
      lastComboLabel: "",
      openCategories: new Set(["signature", "seafood"])
    };

    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => [...document.querySelectorAll(selector)];
    const money = (value) => "$" + Number(value).toFixed(2);
    const hasFixedPrice = (item) => Number(item.price) > 0;
    const priceLabel = (item) => {
      if (item.priceText === "时价") return t("marketPrice");
      if (item.priceText?.includes("$/个")) return item.priceText.replace("$/个", t("perItem"));
      return item.priceText || money(item.price);
    };
    const lineTotalLabel = (item, qty) => hasFixedPrice(item) ? money(item.price * qty) : priceLabel(item);
    const t = (key) => I18N[state.lang][key] || I18N.zh[key] || key;
    const itemName = (item) => item.name[state.lang] || item.name.zh;
    const categoryName = (key) => CATEGORY_NAMES[key]?.[state.lang] || key;
    const tagName = (key) => TAG_NAMES[key]?.[state.lang] || key;
    const getItem = (id) => MENU.find((item) => item.id === id);

    function sample(pool, count, excluded = new Set()) {
      const available = pool.filter((item) => !excluded.has(item.id));
      const picked = [];
      while (picked.length < count && available.length) {
        const index = Math.floor(Math.random() * available.length);
        const [item] = available.splice(index, 1);
        picked.push(item);
        excluded.add(item.id);
      }
      return picked;
    }

    function setQty(id, qty) {
      const item = getItem(id);
      if (!item) return;
      const safeQty = Math.max(0, qty);
      if (safeQty === 0) {
        state.cart.delete(id);
      } else {
        state.cart.set(id, safeQty);
      }
      renderAll();
    }

    function addQty(id, delta) {
      setQty(id, (state.cart.get(id) || 0) + delta);
    }

    function cartItems() {
      return [...state.cart.entries()]
        .map(([id, qty]) => ({ item: getItem(id), qty }))
        .filter((entry) => entry.item && entry.qty > 0);
    }

    function cartTotal() {
      return cartItems().reduce((sum, entry) => {
        return sum + (hasFixedPrice(entry.item) ? entry.item.price * entry.qty : 0);
      }, 0);
    }

    function renderStepper(id) {
      const qty = state.cart.get(id) || 0;
      return `
        <div class="stepper" aria-label="Quantity">
          <button type="button" data-action="minus" data-id="${id}" aria-label="minus">-</button>
          <span>${qty}</span>
          <button type="button" data-action="plus" data-id="${id}" aria-label="plus">+</button>
        </div>
      `;
    }

    function renderHot() {
      $("#hotList").innerHTML = MENU.filter((item) => item.hot).map((item) => `
        <article class="dish-card">
          <div class="dish-art">
            <img src="${item.image}" alt="${itemName(item)}" loading="lazy" />
            <span class="flag">${t("hotTitle")}</span>
          </div>
          <div class="dish-body">
            <h4 class="dish-name">${itemName(item)}</h4>
            <div class="dish-meta">
              <span class="price">${priceLabel(item)}</span>
              ${renderStepper(item.id)}
            </div>
          </div>
        </article>
      `).join("");
    }

    function renderCategories() {
      const categories = CATEGORY_ORDER;
      $("#categoryList").innerHTML = categories.map((category) => {
        const items = MENU.filter((item) => item.category === category);
        const isOpen = state.openCategories.has(category);
        return `
          <section class="category ${isOpen ? "open" : ""}">
            <button class="category-toggle" type="button" data-category="${category}" aria-expanded="${isOpen}">
              <strong>${categoryName(category)}</strong>
              <span>${items.length} ${t("itemsUnit")} ${isOpen ? "−" : "+"}</span>
            </button>
            <div class="category-body">
              ${items.map((item) => `
                <div class="list-item">
                  <span class="list-title">${itemName(item)}</span>
                  <span class="list-price">${priceLabel(item)}</span>
                  ${renderStepper(item.id)}
                </div>
              `).join("")}
            </div>
          </section>
        `;
      }).join("");
    }

    function renderStaticText() {
      document.documentElement.lang = state.lang === "zh" ? "zh-CN" : state.lang;
      $$("[data-i18n]").forEach((node) => {
        const key = node.dataset.i18n;
        if (I18N[state.lang][key]) node.textContent = I18N[state.lang][key];
      });
      $$(".lang-btn").forEach((btn) => btn.classList.toggle("active", btn.dataset.lang === state.lang));
      $$(".choice").forEach((btn) => btn.classList.toggle("active", btn.dataset.purpose === state.purpose));
      $$(".tab-btn").forEach((btn) => btn.classList.toggle("active", btn.dataset.tab === state.activeTab));
      $("#menuPanel").classList.toggle("active", state.activeTab === "menu");
      $("#smartPanel").classList.toggle("active", state.activeTab === "smart");
    }

    function renderCart() {
      const items = cartItems();
      const count = items.reduce((sum, entry) => sum + entry.qty, 0);
      $("#cartCount").textContent = `${count} ${t("itemsUnit")} · ${t("expandTip")}`;
      $("#cartTotal").textContent = money(cartTotal());
      $("#cartPanel").innerHTML = items.length ? items.map(({ item, qty }) => `
        <div class="cart-item">
          <div>
            <span class="cart-name">${itemName(item)}</span>
            <span class="cart-small">${priceLabel(item)} × ${qty} = ${lineTotalLabel(item, qty)}</span>
          </div>
          ${renderStepper(item.id)}
        </div>
      `).join("") : `<div class="empty">${t("emptyCart")}</div>`;
    }

    function renderCombo() {
      const result = $("#comboResult");
      if (!state.lastCombo) {
        result.hidden = true;
        result.innerHTML = "";
        return;
      }
      const total = state.lastCombo.reduce((sum, entry) => {
        return sum + (hasFixedPrice(entry.item) ? entry.item.price * entry.qty : 0);
      }, 0);
      result.hidden = false;
      result.innerHTML = `
        <h4 class="combo-title">${t("comboTitle")}</h4>
        <p class="combo-sub">${t("comboSub")}</p>
        <ul class="combo-list">
          ${state.lastCombo.map(({ item, qty }) => `
            <li>
              <span>${itemName(item)} × ${qty}</span>
              <strong>${lineTotalLabel(item, qty)}</strong>
            </li>
          `).join("")}
        </ul>
        <div class="dish-meta" style="margin-bottom: 14px;">
          <strong>${state.lastComboLabel}</strong>
          <span class="price">${money(total)}</span>
        </div>
        <div class="combo-actions">
          <button class="ghost-btn" id="rerollCombo">${t("reroll")}</button>
          <button class="primary-btn" id="importCombo">${t("importCart")}</button>
        </div>
      `;
    }

    function renderAll() {
      renderStaticText();
      renderHot();
      renderCategories();
      renderCart();
      renderCombo();
    }

    function buildCombo() {
      const people = $("#peopleSelect").value;
      const purpose = state.purpose;
      const excluded = new Set();
      const by = (predicate) => MENU.filter(predicate);
      const combo = [];
      const push = (items) => items.forEach((item) => combo.push({ item, qty: 1 }));
      const pick = (pool, count) => push(sample(pool, count, excluded));

      const signature = by((item) => item.tags.includes("招牌肉菜"));
      const wineDish = by((item) => item.tags.includes("下酒") && !item.tags.includes("主食"));
      const mealDish = by((item) => item.tags.includes("吃饭") && !item.tags.includes("主食"));
      const veg = by((item) => item.tags.includes("素菜"));
      const staple = by((item) => item.tags.includes("主食") && hasFixedPrice(item));

      if (purpose === "下酒") {
        if (people === "1") {
          pick(wineDish, 2);
        } else if (people === "2") {
          pick(signature, 1);
          pick(wineDish, 2);
          pick(veg, 1);
        } else if (people === "3-4") {
          pick(signature, 1);
          pick(wineDish, 2);
          pick(veg, 1);
        } else {
          pick(signature, 2);
          pick(wineDish, 3);
          pick(veg, 2);
        }
      } else {
        if (people === "1") {
          pick(mealDish, 1);
          pick(veg, 1);
          pick(staple, 1);
        } else if (people === "2") {
          pick(signature, 1);
          pick(mealDish, 1);
          pick(veg, 1);
          pick(staple, 1);
        } else if (people === "3-4") {
          pick(signature, 1);
          pick(mealDish, 2);
          pick(veg, 1);
          pick(staple, 1);
        } else {
          pick(signature, 2);
          pick(mealDish, 3);
          pick(veg, 2);
          pick(staple, 2);
        }
      }

      state.lastCombo = combo.filter(({ item }) => MENU.some((menuItem) => menuItem.id === item.id));
      state.lastComboLabel = `${$("#peopleSelect").selectedOptions[0].textContent} · ${purpose === "下酒" ? t("wine") : t("meal")}`;
      renderAll();
    }

    function importCombo() {
      if (!state.lastCombo) return;
      state.lastCombo.forEach(({ item, qty }) => setQty(item.id, (state.cart.get(item.id) || 0) + qty));
      showToast(t("imported"));
    }

    function orderText() {
      const items = cartItems();
      const lines = [`【${t("orderTitle")}】`];
      items.forEach(({ item, qty }, index) => {
        lines.push(`${index + 1}. ${itemName(item)} x${qty}`);
      });
      lines.push(`${t("orderTotal")} ${money(cartTotal())}`);
      return lines.join("\n");
    }

    async function copyToClipboard(text) {
      if (navigator.clipboard?.writeText) {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (error) {
          // Some file:// and mobile browsers block the modern clipboard API.
        }
      }
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      textarea.style.top = "0";
      document.body.appendChild(textarea);
      textarea.select();
      textarea.setSelectionRange(0, textarea.value.length);
      let copied = false;
      try {
        copied = document.execCommand("copy");
      } catch (error) {
        copied = false;
      }
      textarea.remove();
      return copied;
    }

    function openTelegram() {
      window.location.href = TELEGRAM_APP_LINK;
      setTimeout(() => {
        window.location.href = TELEGRAM_WEB_LINK;
      }, 900);
    }

    async function checkout() {
      if (!cartItems().length) {
        showToast(t("noItems"));
        return;
      }
      const text = orderText();
      const copied = await copyToClipboard(text);
      if (copied) {
        showToast(t("copied"));
        setTimeout(openTelegram, 650);
      } else {
        showToast(t("copyFallback") + "\n\n" + text);
      }
    }

    function showToast(message) {
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 3200);
    }

    document.addEventListener("click", (event) => {
      const langBtn = event.target.closest(".lang-btn");
      if (langBtn) {
        state.lang = langBtn.dataset.lang;
        renderAll();
        return;
      }

      const tabBtn = event.target.closest(".tab-btn");
      if (tabBtn) {
        state.activeTab = tabBtn.dataset.tab;
        renderAll();
        return;
      }

      const purposeBtn = event.target.closest(".choice");
      if (purposeBtn) {
        state.purpose = purposeBtn.dataset.purpose;
        renderAll();
        return;
      }

      const categoryBtn = event.target.closest(".category-toggle");
      if (categoryBtn) {
        const category = categoryBtn.dataset.category;
        if (state.openCategories.has(category)) {
          state.openCategories.delete(category);
        } else {
          state.openCategories.add(category);
        }
        renderCategories();
        return;
      }

      const stepBtn = event.target.closest("[data-action]");
      if (stepBtn) {
        addQty(stepBtn.dataset.id, stepBtn.dataset.action === "plus" ? 1 : -1);
        return;
      }

      if (event.target.closest("#cartToggle")) {
        $("#cartPanel").classList.toggle("open");
        return;
      }

      if (event.target.closest("#generateCombo") || event.target.closest("#rerollCombo")) {
        buildCombo();
        return;
      }

      if (event.target.closest("#importCombo")) {
        importCombo();
        return;
      }

      if (event.target.closest("#clearCart")) {
        state.cart.clear();
        renderAll();
        showToast(t("cleared"));
        return;
      }

      if (event.target.closest("#checkoutBtn")) {
        checkout();
      }
    });

    renderAll();
  </script>
</body>
</html>
