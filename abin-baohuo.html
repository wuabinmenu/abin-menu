<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>啊斌大排档报货</title>
  <style>
    :root{--blue:#2176e8;--blue2:#0b3a78;--yellow:#f6f23b;--ink:#10264a;--muted:#65758e;--line:#dbe9fb}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;padding-bottom:calc(112px + env(safe-area-inset-bottom));font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC","Noto Sans Khmer",Arial,sans-serif;color:var(--ink);background:linear-gradient(90deg,rgba(33,118,232,.055) 1px,transparent 1px),linear-gradient(rgba(33,118,232,.045) 1px,transparent 1px),linear-gradient(180deg,#fbfdff,#eef7ff);background-size:18px 18px,18px 18px,auto}.app{width:min(100%,760px);margin:auto}
    header{position:sticky;top:0;z-index:10;padding:18px 16px 14px;color:#fff;background:var(--blue);border-bottom:5px solid var(--yellow);box-shadow:0 10px 22px rgba(33,118,232,.18)}.tag{display:inline-flex;align-items:center;height:28px;padding:0 10px;border:2px solid var(--yellow);border-radius:999px;color:var(--yellow);font-size:13px;font-weight:900;background:rgba(255,255,255,.12)}h1{margin:10px 0 5px;color:var(--yellow);font-size:clamp(30px,8vw,46px);line-height:1.02;letter-spacing:0}.sub{display:flex;justify-content:space-between;gap:12px;font-size:14px;font-weight:800;color:rgba(255,255,255,.92)}
    .tools{display:grid;grid-template-columns:1fr auto;gap:10px;padding:14px 14px 8px}.search,.clear{height:44px;border:2px solid var(--blue);border-radius:12px;background:#fff;color:var(--blue2);font-size:16px;font-weight:900;outline:none}.search{width:100%;padding:0 14px}.clear{padding:0 14px}.stats{padding:0 16px 8px;color:var(--muted);font-size:13px;font-weight:800}
    .cat{margin:12px 14px 18px;overflow:hidden;border:2px solid var(--blue);border-radius:14px;background:#fff;box-shadow:0 12px 30px rgba(20,78,145,.12)}summary{display:flex;justify-content:space-between;align-items:center;min-height:52px;padding:0 14px;list-style:none;cursor:pointer;color:var(--yellow);background:var(--blue);font-size:18px;font-weight:1000}summary::-webkit-details-marker{display:none}summary small{color:#fff;font-size:13px}.rows{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;padding:10px}
    .item{display:block;min-height:126px;padding:10px;border:1px solid var(--line);border-radius:12px;background:#fff}.item:last-child{border-bottom:1px solid var(--line)}.name{display:block;min-width:0;min-height:58px;padding:0 0 8px}.zh{font-size:16px;line-height:1.15;font-weight:1000}.km{margin-top:5px;color:var(--muted);font-size:12px;line-height:1.25;font-weight:800;word-break:break-word}.amount{display:grid;grid-template-columns:1fr 32px;height:40px;overflow:hidden;border:2px solid var(--blue);border-radius:11px;background:#fff}input[type=number]{width:100%;min-width:0;border:0;padding:0 6px;text-align:center;color:var(--ink);background:transparent;font-size:18px;font-weight:1000;outline:none;-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{margin:0;-webkit-appearance:none}.unit{display:grid;place-items:center;color:var(--blue2);background:var(--yellow);font-size:13px;font-weight:1000}.hide{display:none}
    .bar{position:fixed;left:0;right:0;bottom:0;z-index:20;padding:12px 14px calc(12px + env(safe-area-inset-bottom));border-top:4px solid var(--blue);background:rgba(255,255,255,.96);box-shadow:0 -14px 30px rgba(18,62,117,.14);backdrop-filter:blur(10px)}.barin{display:grid;grid-template-columns:1fr 1.6fr;gap:10px;width:min(100%,760px);margin:auto}.box{display:flex;flex-direction:column;justify-content:center;min-height:54px;padding:0 12px;border:2px solid var(--blue);border-radius:12px;background:#fff;font-weight:1000}.box small{margin-top:2px;color:var(--muted);font-size:12px}.gen{min-height:54px;border:0;border-radius:12px;color:var(--blue2);background:var(--yellow);font-size:18px;font-weight:1000}
    .toast{position:fixed;left:50%;bottom:calc(104px + env(safe-area-inset-bottom));z-index:40;width:min(calc(100% - 28px),520px);transform:translateX(-50%) translateY(18px);padding:14px 16px;border:2px solid var(--blue);border-radius:14px;color:var(--blue2);background:#fff;box-shadow:0 12px 30px rgba(20,78,145,.18);font-size:15px;font-weight:900;opacity:0;pointer-events:none;transition:.22s}.toast.show{transform:translateX(-50%) translateY(0);opacity:1}dialog{width:min(calc(100% - 28px),560px);border:2px solid var(--blue);border-radius:16px;padding:0;color:var(--ink);background:#fff;box-shadow:0 24px 80px rgba(11,58,120,.26)}dialog::backdrop{background:rgba(16,38,74,.36)}.mh{padding:14px 16px;color:var(--yellow);background:var(--blue);font-size:18px;font-weight:1000}textarea{display:block;width:calc(100% - 24px);min-height:260px;margin:12px;border:1px solid var(--line);border-radius:12px;padding:12px;color:var(--ink);background:#fbfdff;font-size:15px;line-height:1.5;outline:none;resize:vertical}.ma{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px 12px}.ma button{min-height:48px;border-radius:12px;font-size:16px;font-weight:1000}.ghost{border:2px solid var(--blue);color:var(--blue2);background:#fff}.primary{border:0;color:var(--blue2);background:var(--yellow)}
  </style>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="ea6b0e1b-bf74-4ee2-a98a-0ad8d7945753" data-domains="wuabinmenu.github.io"></script>
</head>
<body>
  <div class="app"><header><div class="tag">中柬双语 · 报货小工具</div><h1>啊斌大排档报货</h1><div class="sub"><span>填数量，自动生成报货单</span><span id="date"></span></div></header><div class="tools"><input id="search" class="search" type="search" placeholder="搜索食材"><button id="clear" class="clear">清空</button></div><div id="stats" class="stats">共 0 项 · 已填 0 项</div><main id="list"></main></div>
  <div class="bar"><div class="barin"><div class="box"><span id="picked">已填 0 项</span><small>空数量不会生成</small></div><button id="generate" class="gen">生成报货单</button></div></div>
  <div id="toast" class="toast">已复制</div><dialog id="dialog"><div class="mh">报货单已生成</div><textarea id="result" readonly></textarea><div class="ma"><button id="close" class="ghost">关闭</button><button id="copy" class="primary">再复制一次</button></div></dialog>
  <script>
    const data=[
      {t:"蔬菜",a:[["青椒","ម្ទេសបៃតង","kg"],["菜椒","ម្ទេសផ្អែម","kg"],["小米辣","ម្ទេសតូច","kg"],["红椒","ម្ទេសក្រហម","kg"],["葱","ស្លឹកខ្ទឹម","kg"],["香菜","ជីវ៉ាន់ស៊ុយ","kg"],["芹菜","ជីឆាយ","kg"],["蘑菇","ផ្សិត","包"],["金针菇","ផ្សិតម្ជុល","包"],["黄瓜","ត្រសក់","kg"],["土豆","ដំឡូងបារាំង","kg"],["芋头","ត្រាវ","kg"],["姜","ខ្ញី","kg"],["玉米","ពោត","kg"],["茄子","ត្រប់","kg"],["白萝卜","ឆៃថាវ","kg"],["胡萝卜","ការ៉ុត","kg"],["荷兰豆","សណ្ដែកខៀវ","kg"],["菠菜","គុយលេង","kg"],["油麦菜","យ៉ូមៃឆាយ","kg"],["上海青","ស្ពៃតឿ","kg"],["包菜","ស្ពៃក្តោប","kg"],["生菜","សាឡាត់","kg"],["酸菜","ជ្រក់ស្ពៃ","包"],["花菜","ផ្កាខាត់ណា","kg"],["韭菜","ជូឆាយ","kg"],["豆芽","សណ្តែកបណ្តុះ","kg"],["西红柿","ប៉េងប៉ោះ","kg"],["苦瓜","ម្រះ","kg"],["洋葱","ខ្ទឹមបារាំង","kg"],["空心菜","ត្រកួន","kg"],["芥蓝","ខាតណា","kg"],["娃娃菜","បូគោតូច","kg"],["小白菜","ស្ពៃក្រញ៉ាញ់","kg"],["大白菜","ស្ពៃបូកគោ","kg"],["豆腐","តៅហ៊ូ","块"]]},
      {t:"肉类",a:[["猪蹄","ក្រញ៉ាំជ្រូក","个"],["牛腱子","សាច់ស្រួយ","kg"],["肉沫","សាច់ចិញ្ច្រាំ","kg"],["猪肝","ថ្លើមជ្រូក","kg"],["瘦肉","សាច់ជ្រូកសុទ្ធ","kg"],["牛腩","សាច់យ៉ែវ","kg"],["猪腰","ក្រលៀនជ្រូក","kg"],["猪心","បេះដូងជ្រូក","kg"],["排骨","ឆ្អឹងជំនីជ្រូក","kg"],["大肠","ពោះវៀនធំជ្រូក","kg"],["猪油","ខ្លាញ់ជ្រូក","kg"],["牛排","ឆ្អឹងជំនីគោ","kg"],["五花肉","សាច់ជ្រូកបីជាន់","kg"],["牛肉","សាច់គោ","kg"],["猪肚","ក្រពះជ្រូក","kg"],["猪脚","ជើងជ្រូក","个"]]},
      {t:"海鲜 / 禽类",a:[["鸡","មាន់","只"],["鸭","ទា","只"],["鱿鱼","មឹក","kg"],["红鱼","ត្រីក្រហម","条"],["黑鱼","ត្រីខ្មៅ","条"],["牛蛙","កង្កែប","kg"],["鸡胗","ក្រពះមាន់","kg"],["虾","បង្គា","kg"],["鸡腿","ភ្លៅមាន់","kg"]]}
    ];
    const $=id=>document.getElementById(id),d=new Date(),dateText=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;$('date').textContent=dateText;
    $('list').innerHTML=data.map((c,ci)=>`<details class="cat" open><summary><span>${c.t}</span><small>${c.a.length} 项</small></summary><div class="rows">${c.a.map((x,i)=>`<div class="item" data-key="${x[0]} ${x[1]}"><label class="name" for="i${ci}-${i}"><div class="zh">${x[0]}</div><div class="km">${x[1]}</div></label><div class="amount"><input id="i${ci}-${i}" inputmode="decimal" type="number" min="0" step="0.1" data-zh="${x[0]}" data-km="${x[1]}" data-unit="${x[2]}"><span class="unit">${x[2]}</span></div></div>`).join("")}</div></details>`).join("");
    const inputs=()=>[...document.querySelectorAll('input[type=number]')],picked=()=>inputs().map(i=>({zh:i.dataset.zh,km:i.dataset.km,unit:i.dataset.unit,qty:i.value.trim()})).filter(x=>x.qty!==''&&Number(x.qty)>0);
    function refresh(){const total=data.reduce((s,c)=>s+c.a.length,0),n=picked().length;$('stats').textContent=`共 ${total} 项 · 已填 ${n} 项`;$('picked').textContent=`已填 ${n} 项`}function orderText(){const p=picked();return p.length?[dateText,'',...p.map(x=>`${x.zh} / ${x.km} : ${x.qty} ${x.unit}`)].join('\n'):''}
    async function copyText(t){if(navigator.clipboard&&window.isSecureContext){try{await navigator.clipboard.writeText(t);return true}catch(e){}}const ta=$('result');ta.value=t;ta.removeAttribute('readonly');ta.focus();ta.select();ta.setSelectionRange(0,ta.value.length);let ok=false;try{ok=document.execCommand('copy')}catch(e){}ta.setAttribute('readonly','readonly');if(ok)return true;const helper=document.createElement('textarea');helper.value=t;helper.setAttribute('readonly','readonly');helper.style.position='fixed';helper.style.left='-9999px';helper.style.top='0';document.body.appendChild(helper);helper.focus();helper.select();helper.setSelectionRange(0,helper.value.length);try{ok=document.execCommand('copy')}catch(e){}helper.remove();return !!ok}function tip(t){$('toast').textContent=t;$('toast').classList.add('show');clearTimeout(tip.timer);tip.timer=setTimeout(()=>$('toast').classList.remove('show'),1800)}
    inputs().forEach(i=>i.addEventListener('input',refresh));refresh();$('search').addEventListener('input',e=>{const k=e.target.value.trim().toLowerCase();document.querySelectorAll('.item').forEach(r=>r.classList.toggle('hide',k&&!r.dataset.key.toLowerCase().includes(k)))});$('clear').onclick=()=>{inputs().forEach(i=>i.value='');$('search').value='';document.querySelectorAll('.item').forEach(r=>r.classList.remove('hide'));refresh();tip('已清空')};$('generate').onclick=async()=>{const t=orderText();if(!t){tip('还没有填写数量');return}$('result').value=t;$('dialog').showModal();try{const ok=await copyText(t);tip(ok?'报货单已复制，可以直接粘贴发送':'已生成，请长按文本手动复制')}catch(e){tip('已生成，请长按文本手动复制')}};$('copy').onclick=async()=>{const ok=await copyText($('result').value);tip(ok?'已再次复制':'复制失败，请长按文本手动复制')};$('close').onclick=()=>$('dialog').close();
  </script>
</body>
</html>
